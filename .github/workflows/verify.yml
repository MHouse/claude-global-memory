name: verify

on:
  pull_request:
  push:
    branches: [main]

# Runs the bundled bootstrap harness on both platforms. The two scripts must
# behave identically (see CLAUDE.md / BOOTSTRAP.md), so both run on every PR.
jobs:
  bash:
    name: verify.sh (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash test/verify.sh

  powershell:
    name: verify.ps1 (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - run: pwsh -NoProfile -ExecutionPolicy Bypass -File test/verify.ps1

  # Single anchor check for branch protection: the main-protection ruleset
  # requires this one context instead of tracking each platform job by name.
  # if: always() so a failed/cancelled needed job makes this REPORT failure
  # rather than be skipped -- a skipped required check would block forever.
  ci-success:
    name: ci-success
    if: always()
    needs: [bash, powershell]
    runs-on: ubuntu-latest
    steps:
      - name: fail unless every needed job succeeded
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') || contains(needs.*.result, 'skipped')
        run: exit 1
